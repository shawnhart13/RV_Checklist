<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f2937">
  <title>RV Checklist</title>
<style>

:root {
  --bg: #f6f4ef;
  --card: #ffffff;
  --ink: #111827;
  --muted: #6b7280;
  --line: #e5e7eb;
  --brand: #1f2937;
  --brand-soft: #e7ecef;
  --ok: #166534;
  --danger: #9f1239;
  --shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
  --radius: 18px;
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  justify-content: space-between;
  gap: 16px;
  padding: calc(18px + env(safe-area-inset-top)) 18px 18px;
  background: rgba(246, 244, 239, 0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(229, 231, 235, 0.8);
}

.eyebrow {
  margin: 0 0 4px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  font-weight: 700;
}

h1 {
  margin: 0;
  font-size: clamp(24px, 5vw, 42px);
  line-height: 1.05;
}

.subtitle {
  margin: 6px 0 0;
  color: var(--muted);
}

.progress-pill {
  min-width: 112px;
  align-self: center;
  background: var(--brand);
  color: white;
  border-radius: 999px;
  padding: 10px 14px;
  text-align: center;
  box-shadow: var(--shadow);
}

.progress-pill strong {
  display: block;
  font-size: 22px;
  line-height: 1;
}

.progress-pill span {
  display: block;
  font-size: 11px;
  opacity: .85;
  margin-top: 4px;
}

main {
  display: grid;
  grid-template-columns: 340px minmax(0, 1fr);
  gap: 18px;
  max-width: 1300px;
  margin: 0 auto;
  padding: 18px;
}

.sidebar {
  position: sticky;
  top: 122px;
  align-self: start;
  display: grid;
  gap: 14px;
}

.checklist-nav {
  display: grid;
  gap: 10px;
}

.nav-card {
  text-align: left;
  border: 1px solid var(--line);
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: none;
  cursor: pointer;
  color: var(--ink);
}

.nav-card.active {
  border-color: var(--brand);
  box-shadow: var(--shadow);
}

.nav-title {
  display: block;
  font-weight: 800;
  margin-bottom: 4px;
}

.nav-sub {
  display: block;
  color: var(--muted);
  font-size: 13px;
}

.mini-bar {
  display: block;
  height: 6px;
  background: var(--brand-soft);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 10px;
}

.mini-bar span {
  display: block;
  height: 100%;
  background: var(--brand);
}

.note-card,
.toolbar,
.section-card,
.empty {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.note-card {
  padding: 14px;
}

.note-card label {
  display: block;
  font-weight: 800;
  margin-bottom: 8px;
}

textarea,
input[type="search"] {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px;
  font: inherit;
  background: #fff;
}

textarea {
  min-height: 90px;
  resize: vertical;
}

.button-stack {
  display: grid;
  gap: 8px;
}

button {
  font: inherit;
}

.secondary,
.filter {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 11px 12px;
  background: var(--card);
  color: var(--ink);
  cursor: pointer;
  font-weight: 700;
}

.secondary.danger {
  color: var(--danger);
}

.content {
  min-width: 0;
}

.toolbar {
  position: sticky;
  top: 122px;
  z-index: 10;
  padding: 14px;
  display: grid;
  gap: 12px;
  margin-bottom: 14px;
}

.progress-track {
  height: 12px;
  background: var(--brand-soft);
  border-radius: 99px;
  overflow: hidden;
}

.progress-track span {
  display: block;
  height: 100%;
  width: 0;
  background: var(--brand);
  transition: width .2s ease;
}

.filters {
  display: flex;
  gap: 8px;
}

.filter {
  flex: 1;
}

.filter.active {
  background: var(--brand);
  color: white;
}

.sections {
  display: grid;
  gap: 14px;
}

.section-card {
  overflow: hidden;
}

.section-head {
  padding: 16px;
  border-bottom: 1px solid var(--line);
  background: #fafafa;
}

.section-head h2 {
  margin: 0;
  font-size: 19px;
}

.section-head p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.items {
  display: grid;
}

.item {
  display: grid;
  grid-template-columns: 28px 1fr;
  align-items: start;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  min-height: 54px;
}

.item:last-child {
  border-bottom: 0;
}

.item input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.box {
  width: 24px;
  height: 24px;
  border: 2px solid #9ca3af;
  border-radius: 8px;
  margin-top: 1px;
  display: inline-grid;
  place-items: center;
}

.item.done .box {
  border-color: var(--ok);
  background: var(--ok);
}

.item.done .box::after {
  content: "✓";
  color: white;
  font-weight: 900;
  line-height: 1;
}

.item-text {
  line-height: 1.35;
  font-size: 16px;
}

.item.done .item-text {
  text-decoration: line-through;
  color: var(--muted);
}

.empty {
  padding: 24px;
  text-align: center;
  color: var(--muted);
}

footer {
  max-width: 1300px;
  margin: 0 auto;
  padding: 12px 18px 28px;
  color: var(--muted);
  font-size: 13px;
}

@media (max-width: 860px) {
  .app-header {
    display: grid;
    grid-template-columns: 1fr;
  }

  .progress-pill {
    justify-self: start;
    min-width: 150px;
  }

  main {
    grid-template-columns: 1fr;
    padding: 12px;
  }

  .sidebar,
  .toolbar {
    position: static;
  }

  .checklist-nav {
    grid-template-columns: 1fr;
  }
}

</style>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">RV Checklist</p>
      <h1 id="title">Loading…</h1>
      <p id="subtitle" class="subtitle"></p>
    </div>
    <div class="progress-pill">
      <strong id="progressPercent">0%</strong>
      <span id="progressText">0 complete</span>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div id="checklistNav" class="checklist-nav"></div>

      <div class="note-card">
        <label for="tripNote">Trip note</label>
        <textarea id="tripNote" placeholder="Example: Sebago weekend, site 42"></textarea>
      </div>

      <div class="button-stack">
        <button id="exportLog" class="secondary">Export progress</button>
        <button id="resetChecklist" class="secondary danger">Reset current</button>
        <button id="resetAll" class="secondary danger">Reset all</button>
      </div>
    </aside>

    <section class="content">
      <div class="toolbar">
        <div class="progress-track"><span id="progressBar"></span></div>
        <input id="search" type="search" placeholder="Search checklist items">
        <div class="filters">
          <button class="filter active" data-filter="all">All</button>
          <button class="filter" data-filter="open">Open</button>
          <button class="filter" data-filter="done">Done</button>
        </div>
      </div>

      <div id="sections" class="sections"></div>
    </section>
  </main>

  <footer>
    <p>Progress saves on this device only. Good for campgrounds; bad for excuses.</p>
  </footer>

          "Inspect strut assemblies and jam nuts",
          "Confirm all Hensley hardware is tight and complete",
          "Lubricate hitch bar taper / contact points as appropriate",
          "Confirm safety chains are in good condition",
          "Confirm breakaway cable is not frayed or damaged",
          "Confirm 7-way cord and plug are clean and undamaged",
          "Confirm torque/condition of hitch receiver hardware on tow vehicle"
        ]
      },
      {
        "title": "Electrical and Battery System",
        "items": [
          "Inspect battery terminals for corrosion and tightness",
          "Confirm battery is fully charged",
          "Check battery disconnect switch position",
          "Check converter/charger operation on shore power",
          "Check 12V lights and fans",
          "Check GFCI outlet reset/test",
          "Check major 120V outlets",
          "Check fuses and breakers",
          "Check solar controller / monitor if equipped",
          "Confirm emergency gear can be powered or charged"
        ]
      },
      {
        "title": "Safety Equipment",
        "items": [
          "Test smoke detector",
          "Test carbon monoxide detector",
          "Test propane detector",
          "Replace detector batteries if needed",
          "Check detector expiration dates",
          "Check fire extinguisher pressure and date",
          "Confirm first aid kit is stocked",
          "Confirm emergency exits open",
          "Confirm flashlight/headlamp works",
          "Confirm roadside kit is packed",
          "Confirm jack, lug wrench/socket, torque wrench, and leveling blocks are packed",
          "Confirm registration, insurance, roadside assistance, and campground info are available"
        ]
      },
      {
        "title": "Slides, Awning, Seals, and Exterior Gear",
        "items": [
          "Extend and retract slides at home if space allows",
          "Listen for unusual slide motor noise or binding",
          "Inspect slide roof/topper if equipped",
          "Inspect slide seals",
          "Extend and retract awning if safe",
          "Inspect awning fabric and arms",
          "Check entry steps and handrail",
          "Check stabilizer jacks / leveling system operation",
          "Check exterior compartment locks and latches",
          "Wash windows and mirrors if needed",
          "Confirm sewer hose, fittings, gloves, and supports are packed",
          "Confirm fresh water hose, regulator, filter, and fittings are packed",
          "Confirm power cord, adapters, and surge protector/EMS are packed"
        ]
      },
      {
        "title": "Final First-Trip Readiness Check",
        "items": [
          "No active water leaks found",
          "Water heater confirmed full before heating",
          "Fresh water system sanitized or intentionally flushed only",
          "Propane appliances tested or service scheduled",
          "Tires inspected, inflated, and lug nuts torqued",
          "Brakes and lights tested",
          "Hitch inspected and ready",
          "Safety detectors tested",
          "Roof/seals checked for obvious issues",
          "First short tow planned conservatively",
          "Re-check tires, hubs, hitch, and straps/gear after the first few miles",
          "Final question: \u201cWhat failure would ruin the first trip, and have I checked it?\u201d"
        ]
      }
    ]
  }
];

const STORAGE_KEY = "rvChecklistApp.v1";
let state = loadState();
let activeChecklistId = state.activeChecklistId || CHECKLISTS[0].id;
let filterMode = "all";
let query = "";

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    return {};
  }
}

function saveState() {
  state.activeChecklistId = activeChecklistId;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function keyFor(checklistId, sectionIndex, itemIndex) {
  return `${checklistId}::${sectionIndex}::${itemIndex}`;
}

function isDone(checklistId, sectionIndex, itemIndex) {
  return !!state[keyFor(checklistId, sectionIndex, itemIndex)];
}

function setDone(checklistId, sectionIndex, itemIndex, value) {
  state[keyFor(checklistId, sectionIndex, itemIndex)] = value;
  saveState();
  render();
}

function resetChecklist(checklistId) {
  if (!confirm("Reset this checklist?")) return;
  Object.keys(state).forEach(k => {
    if (k.startsWith(checklistId + "::")) delete state[k];
  });
  saveState();
  render();
}

function resetAll() {
  if (!confirm("Reset every checklist?")) return;
  state = {};
  activeChecklistId = CHECKLISTS[0].id;
  saveState();
  render();
}

function getCounts(checklist) {
  let total = 0;
  let done = 0;
  checklist.sections.forEach((section, si) => {
    section.items.forEach((_, ii) => {
      total++;
      if (isDone(checklist.id, si, ii)) done++;
    });
  });
  return { total, done, pct: total ? Math.round((done / total) * 100) : 0 };
}

function renderNav() {
  const nav = document.querySelector("#checklistNav");
  nav.innerHTML = "";
  CHECKLISTS.forEach(list => {
    const counts = getCounts(list);
    const button = document.createElement("button");
    button.className = "nav-card" + (list.id === activeChecklistId ? " active" : "");
    button.innerHTML = `
      <span class="nav-title">${escapeHtml(list.title)}</span>
      <span class="nav-sub">${escapeHtml(list.subtitle)} · ${counts.done}/${counts.total}</span>
      <span class="mini-bar"><span style="width:${counts.pct}%"></span></span>
    `;
    button.addEventListener("click", () => {
      activeChecklistId = list.id;
      saveState();
      render();
    });
    nav.appendChild(button);
  });
}

function render() {
  renderNav();
  const checklist = CHECKLISTS.find(c => c.id === activeChecklistId) || CHECKLISTS[0];
  const counts = getCounts(checklist);

  document.querySelector("#title").textContent = checklist.title;
  document.querySelector("#subtitle").textContent = checklist.subtitle + " · " + checklist.mode;
  document.querySelector("#progressText").textContent = `${counts.done} of ${counts.total} complete`;
  document.querySelector("#progressPercent").textContent = `${counts.pct}%`;
  document.querySelector("#progressBar").style.width = `${counts.pct}%`;

  const container = document.querySelector("#sections");
  container.innerHTML = "";

  checklist.sections.forEach((section, sectionIndex) => {
    const matchingItems = section.items
      .map((item, itemIndex) => ({ item, itemIndex }))
      .filter(({ item, itemIndex }) => {
        const done = isDone(checklist.id, sectionIndex, itemIndex);
        const matchesMode = filterMode === "all" || (filterMode === "open" && !done) || (filterMode === "done" && done);
        const matchesQuery = !query || item.toLowerCase().includes(query.toLowerCase()) || section.title.toLowerCase().includes(query.toLowerCase());
        return matchesMode && matchesQuery;
      });

    if (matchingItems.length === 0) return;

    const sectionEl = document.createElement("section");
    sectionEl.className = "section-card";

    const sectionTotal = section.items.length;
    const sectionDone = section.items.filter((_, ii) => isDone(checklist.id, sectionIndex, ii)).length;

    sectionEl.innerHTML = `
      <div class="section-head">
        <div>
          <h2>${escapeHtml(section.title)}</h2>
          <p>${sectionDone}/${sectionTotal} complete</p>
        </div>
      </div>
      <div class="items"></div>
    `;

    const itemsEl = sectionEl.querySelector(".items");

    matchingItems.forEach(({ item, itemIndex }) => {
      const id = keyFor(checklist.id, sectionIndex, itemIndex);
      const done = isDone(checklist.id, sectionIndex, itemIndex);
      const itemEl = document.createElement("label");
      itemEl.className = "item" + (done ? " done" : "");
      itemEl.innerHTML = `
        <input type="checkbox" ${done ? "checked" : ""} aria-label="${escapeHtml(item)}">
        <span class="box"></span>
        <span class="item-text">${escapeHtml(item)}</span>
      `;
      itemEl.querySelector("input").addEventListener("change", e => {
        setDone(checklist.id, sectionIndex, itemIndex, e.target.checked);
      });
      itemsEl.appendChild(itemEl);
    });

    container.appendChild(sectionEl);
  });

  if (!container.children.length) {
    container.innerHTML = `<div class="empty">No items match the current filter.</div>`;
  }

  document.querySelector("#tripNote").value = state.tripNote || "";
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function exportLog() {
  const lines = [];
  lines.push("RV Checklist Progress");
  lines.push("Generated: " + new Date().toLocaleString());
  lines.push("");
  if (state.tripNote) {
    lines.push("Trip note: " + state.tripNote);
    lines.push("");
  }

  CHECKLISTS.forEach(list => {
    const counts = getCounts(list);
    lines.push(`${list.title} — ${counts.done}/${counts.total} complete`);
    list.sections.forEach((section, si) => {
      lines.push("  " + section.title);
      section.items.forEach((item, ii) => {
        lines.push(`    ${isDone(list.id, si, ii) ? "[x]" : "[ ]"} ${item}`);
      });
    });
    lines.push("");
  });

  const blob = new Blob([lines.join("\n")], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "rv-checklist-progress.txt";
  a.click();
  URL.revokeObjectURL(url);
}

document.querySelector("#resetChecklist").addEventListener("click", () => resetChecklist(activeChecklistId));
document.querySelector("#resetAll").addEventListener("click", resetAll);
document.querySelector("#exportLog").addEventListener("click", exportLog);

document.querySelector("#tripNote").addEventListener("input", e => {
  state.tripNote = e.target.value;
  saveState();
});

document.querySelector("#search").addEventListener("input", e => {
  query = e.target.value;
  render();
});

document.querySelectorAll("[data-filter]").forEach(btn => {
  btn.addEventListener("click", () => {
    filterMode = btn.dataset.filter;
    document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

render();

</script>
